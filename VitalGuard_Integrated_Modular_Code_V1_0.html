<script type="module">

/*
===============================================================================
VitalGuard Integrated Modular Code V1.0 — runtime kernel
===============================================================================
This kernel is intentionally small, explicit, and non-visual.

Important operational rule:
- Loading this HTML file DOES NOT mount, render, boot, preview, iframe, canvas,
  or execute either embedded application payload.
- The two original single-file applications are stored as Base64 source payloads.
- The kernel only exposes a modular extraction API on window.VitalGuardIntegratedV10.
- A future developer can decode the payloads, list modules, extract a module
  segment, parse non-executed HTML parts, or export the original source as a Blob.

Module philosophy:
1. core.EventBus
   A tiny local event bus. It lets extracted modules communicate without binding
   to global UI state. It is useful when rebuilding either source app into a
   fully separated modular runtime.

2. core.ModuleRegistry
   A dependency-aware module registry. Integration modules are defined with a
   name, dependency list, factory, and metadata object. Factories run lazily only
   when require(name) is called.

3. core.SafeText
   Small text utility functions used by the integration layer. It avoids DOM
   injection and keeps filenames, module names, and extracted snippets bounded.

4. core.SourcePayloadStore
   Reads Base64 source payloads from inert script tags and decodes UTF-8 text.
   Decoding is lazy. The original app code is not executed during decoding.

5. core.HtmlPartExtractor
   Parses a full HTML source string with DOMParser and returns detached strings
   for title, head, styles, body markup, and scripts. DOMParser does not execute
   scripts and does not render an app.

6. core.ModuleBoundaryExtractor
   Provides module-level extraction. The Swarm artifact is split by its
   registerModule(...) calls. VitalGuard AI is split by its source banner comment
   blocks documented in the uploaded code manual. This gives future maintainers
   reusable module-sized source sections without modifying the original payloads.

7. integration.AppCatalog
   Central catalog that maps stable app keys to payload IDs, manual references,
   module maps, and source metadata.

8. integration.Orchestrator
   High-level facade for listApps(), listModules(appKey), getSource(appKey),
   getHtmlParts(appKey), and extractModule(appKey, moduleName). It performs no
   automatic rendering. It is the main API intended for future reuse.

9. integration.ExportTools
   Optional helper for creating Blob URLs or saving decoded source/module
   segments. It only runs when explicitly called by a developer.

10. integration.SecurityPolicy
   Documents and exposes the no-auto-render/no-egress/single-file policy used by
   this integration artifact. It is intentionally declarative.
===============================================================================
*/
(function(){
  'use strict';

  const VERSION = '1.0';
  const GLOBAL_NAME = 'VitalGuardIntegratedV10';

  function readManifest(){
    const el = document.getElementById('vg-integrated-manifest');
    if(!el) return {};
    try { return JSON.parse(el.textContent || '{}'); }
    catch(e){ return {error:'manifest_parse_failed', message:String(e && e.message || e)}; }
  }

  const MANIFEST = Object.freeze(readManifest());
  const moduleDefinitions = new Map();
  const moduleInstances = new Map();

  function define(name, deps, factory, meta){
    if(typeof name !== 'string' || !name) throw new Error('define(name): invalid module name');
    if(moduleDefinitions.has(name)) throw new Error('Duplicate module: ' + name);
    if(typeof deps === 'function') { meta = factory || {}; factory = deps; deps = []; }
    moduleDefinitions.set(name, Object.freeze({
      name,
      deps: Object.freeze((deps || []).slice()),
      factory,
      meta: Object.freeze(meta || {})
    }));
  }

  function requireModule(name){
    if(moduleInstances.has(name)) return moduleInstances.get(name);
    const def = moduleDefinitions.get(name);
    if(!def) throw new Error('Unknown integration module: ' + name);
    const resolved = def.deps.map(requireModule);
    const api = def.factory.apply(null, resolved) || {};
    moduleInstances.set(name, api);
    return api;
  }

  define('core.EventBus', [], function(){
    const listeners = new Map();
    return {
      on(type, handler){
        if(typeof handler !== 'function') throw new Error('Event handler must be a function');
        const set = listeners.get(type) || new Set();
        set.add(handler); listeners.set(type, set);
        return () => set.delete(handler);
      },
      emit(type, payload){
        const set = listeners.get(type);
        if(!set) return 0;
        let delivered = 0;
        set.forEach(fn => { try { fn(payload); delivered++; } catch(e){} });
        return delivered;
      },
      clear(type){ if(type) listeners.delete(type); else listeners.clear(); },
      eventTypes(){ return Array.from(listeners.keys()); }
    };
  }, {description:'Non-rendering local event bus for integration modules.'});

  define('core.SafeText', [], function(){
    function clean(value, max){
      return String(value == null ? '' : value)
        .replace(/[\u0000-\u001f\u007f]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .slice(0, max || 4000);
    }
    function slug(value){
      return clean(value, 160).toLowerCase().replace(/[^a-z0-9._-]+/g, '_').replace(/^_+|_+$/g, '') || 'module';
    }
    return Object.freeze({clean, slug});
  }, {description:'Bounded text utilities for filenames, module keys, and labels.'});

  define('core.SourcePayloadStore', ['core.SafeText'], function(SafeText){
    const cache = new Map();
    function getPayloadElement(appKey){
      const catalog = (MANIFEST && MANIFEST.sourcePayloads) || {};
      if(!catalog[appKey]) throw new Error('Unknown source payload: ' + appKey);
      const id = 'vg-source-payload-' + appKey;
      const el = document.getElementById(id);
      if(!el) throw new Error('Missing payload element: ' + id);
      return el;
    }
    function decodeBase64Utf8(encoded){
      const compact = String(encoded || '').replace(/\s+/g, '');
      const binary = atob(compact);
      const bytes = new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
      return new TextDecoder('utf-8').decode(bytes);
    }
    function getSource(appKey){
      appKey = SafeText.slug(appKey);
      if(cache.has(appKey)) return cache.get(appKey);
      const el = getPayloadElement(appKey);
      const decoded = decodeBase64Utf8(el.textContent || '');
      cache.set(appKey, decoded);
      return decoded;
    }
    function clearCache(appKey){
      if(appKey) cache.delete(SafeText.slug(appKey)); else cache.clear();
    }
    return Object.freeze({getSource, clearCache});
  }, {description:'Lazy Base64 UTF-8 source decoder. It never executes decoded code.'});

  define('core.HtmlPartExtractor', ['core.SourcePayloadStore'], function(SourcePayloadStore){
    function partsFromSource(source){
      const doc = new DOMParser().parseFromString(source, 'text/html');
      const styles = Array.from(doc.querySelectorAll('style')).map(s => s.textContent || '');
      const scripts = Array.from(doc.querySelectorAll('script')).map(s => s.textContent || '');
      return Object.freeze({
        title: (doc.querySelector('title') && doc.querySelector('title').textContent) || '',
        headHTML: doc.head ? doc.head.innerHTML : '',
        bodyHTML: doc.body ? doc.body.innerHTML : '',
        styles: Object.freeze(styles),
        scripts: Object.freeze(scripts),
        scriptCount: scripts.length,
        styleCount: styles.length
      });
    }
    function getParts(appKey){ return partsFromSource(SourcePayloadStore.getSource(appKey)); }
    return Object.freeze({partsFromSource, getParts});
  }, {description:'Detached HTML parser. DOMParser does not render or execute payloads.'});

  define('core.ModuleBoundaryExtractor', ['core.SourcePayloadStore','core.SafeText'], function(SourcePayloadStore, SafeText){
    function compactName(name){ return SafeText.clean(name, 240); }

    function scanSwarm(source){
      const rx = /(?:var\s+)?([A-Za-z_$][\w$]*)\s*=\s*registerModule\('([^']+)'/g;
      const hits = [];
      let m;
      while((m = rx.exec(source))){
        hits.push({name: m[2], variable: m[1], index: m.index});
      }
      return hits.map((hit, i) => {
        const start = hit.index;
        const end = i + 1 < hits.length ? hits[i+1].index : source.length;
        return Object.freeze({
          name: hit.name,
          variable: hit.variable,
          start,
          end,
          bytes: end - start,
          source: source.slice(start, end)
        });
      });
    }

    function scanVitalGuard(source){
      const rx = /\/\*\s*-{5,}\s*([^*\n][^*]*?)\s*-{5,}\s*\*\//g;
      const hits = [];
      let m;
      while((m = rx.exec(source))){
        hits.push({name: compactName(m[1].replace(/\s+/g, ' ')), index: m.index});
      }
      return hits.map((hit, i) => {
        const start = hit.index;
        const end = i + 1 < hits.length ? hits[i+1].index : source.length;
        return Object.freeze({
          name: hit.name,
          start,
          end,
          bytes: end - start,
          source: source.slice(start, end)
        });
      });
    }

    function list(appKey){
      const source = SourcePayloadStore.getSource(appKey);
      return appKey === 'swarm_mesh_v1_7_2' ? scanSwarm(source) : scanVitalGuard(source);
    }
    function names(appKey){ return list(appKey).map(x => x.name); }
    function extract(appKey, moduleName){
      const wanted = SafeText.clean(moduleName, 240).toLowerCase();
      const modules = list(appKey);
      const exact = modules.find(m => m.name.toLowerCase() === wanted);
      if(exact) return exact;
      const partial = modules.find(m => m.name.toLowerCase().includes(wanted));
      if(partial) return partial;
      throw new Error('Module not found in ' + appKey + ': ' + moduleName);
    }
    return Object.freeze({list, names, extract});
  }, {description:'Extracts module-sized source sections from both embedded apps.'});

  define('integration.AppCatalog', [], function(){
    const payloads = MANIFEST.sourcePayloads || {};
    function listApps(){ return Object.keys(payloads); }
    function getMeta(appKey){
      if(!payloads[appKey]) throw new Error('Unknown app key: ' + appKey);
      return Object.freeze(JSON.parse(JSON.stringify(payloads[appKey])));
    }
    return Object.freeze({listApps, getMeta, manifest: () => MANIFEST});
  }, {description:'Source catalog derived from the uploaded HTML files and code maps.'});

  define('integration.Orchestrator', [
    'integration.AppCatalog',
    'core.SourcePayloadStore',
    'core.HtmlPartExtractor',
    'core.ModuleBoundaryExtractor'
  ], function(AppCatalog, SourcePayloadStore, HtmlPartExtractor, ModuleBoundaryExtractor){
    return Object.freeze({
      version: VERSION,
      noAutoRender: true,
      listApps: AppCatalog.listApps,
      getAppMeta: AppCatalog.getMeta,
      getSource: SourcePayloadStore.getSource,
      getHtmlParts: HtmlPartExtractor.getParts,
      listModules: ModuleBoundaryExtractor.names,
      listModuleRecords: ModuleBoundaryExtractor.list,
      extractModule: ModuleBoundaryExtractor.extract,
      manifest: AppCatalog.manifest
    });
  }, {description:'Main non-rendering API for source decoding and module extraction.'});

  define('integration.ExportTools', ['integration.Orchestrator','core.SafeText'], function(Orchestrator, SafeText){
    function blobFromText(text, type){ return new Blob([text], {type: type || 'text/plain;charset=utf-8'}); }
    function sourceBlob(appKey){ return blobFromText(Orchestrator.getSource(appKey), 'text/html;charset=utf-8'); }
    function moduleBlob(appKey, moduleName){
      const record = Orchestrator.extractModule(appKey, moduleName);
      return blobFromText(record.source, 'text/plain;charset=utf-8');
    }
    function objectUrl(blob){ return URL.createObjectURL(blob); }
    function downloadText(filename, text, type){
      const a = document.createElement('a');
      const url = objectUrl(blobFromText(text, type));
      a.href = url;
      a.download = SafeText.slug(filename) + (filename.includes('.') ? '' : '.txt');
      a.rel = 'noopener';
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 0);
    }
    return Object.freeze({blobFromText, sourceBlob, moduleBlob, objectUrl, downloadText});
  }, {description:'Manual export helpers. Nothing is exported until explicitly called.'});

  define('integration.SecurityPolicy', [], function(){
    const policy = Object.freeze({
      singleFile: true,
      noAutoRender: true,
      autoBootPayloads: false,
      noIframe: true,
      noEmbed: true,
      noObject: true,
      noCanvasInActiveDocument: true,
      payloadEncoding: 'base64 utf-8 source payloads',
      csp: 'connect-src none; object-src none; frame-src none; frame-ancestors none; base-uri none; form-action none',
      note: 'The embedded applications can be decoded and extracted, but this integration artifact does not render or execute them automatically.'
    });
    return Object.freeze({policy: () => policy});
  }, {description:'Declarative integration security and no-preview policy.'});

  const api = Object.freeze({
    version: VERSION,
    noAutoRender: true,
    manifest: () => MANIFEST,
    modules: () => Array.from(moduleDefinitions.keys()),
    moduleMeta: name => moduleDefinitions.get(name) ? moduleDefinitions.get(name).meta : null,
    define,
    require: requireModule,
    orchestrator: () => requireModule('integration.Orchestrator'),
    exportTools: () => requireModule('integration.ExportTools'),
    securityPolicy: () => requireModule('integration.SecurityPolicy').policy()
  });

  Object.defineProperty(window, GLOBAL_NAME, {
    value: api,
    configurable: false,
    writable: false,
    enumerable: true
  });
})();

</script>
