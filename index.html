<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta redirect as a fallback if JavaScript is disabled -->
    <meta http-equiv="refresh" content="0; url=https://mcorpai.org/">
    <title>Redirecting - McorpAI</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth loading pulse animation */
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.5; }
            100% { transform: scale(0.95); opacity: 1; }
        }
        .pulse-loader {
            animation: pulse-ring 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex items-center justify-center min-h-screen font-sans">

    <div class="max-w-md w-full mx-4 p-8 bg-white rounded-2xl shadow-xl border border-slate-100 text-center transition-all duration-300">
        
        <!-- Loading Indicator -->
        <div class="flex justify-center mb-6">
            <div class="relative w-16 h-16 flex items-center justify-center">
                <div class="absolute inset-0 rounded-full bg-blue-100 pulse-loader"></div>
                <svg class="w-8 h-8 text-blue-600 relative z-10 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
        </div>

        <!-- Information Texts in English -->
        <h1 class="text-2xl font-bold text-slate-900 mb-2">Redirecting to our new site</h1>
        <p class="text-slate-500 mb-6 text-sm leading-relaxed">
            You will be automatically redirected to <span class="font-semibold text-blue-600">McorpAI</span> in a moment.<br>
            If the page does not load, please click the button below.
        </p>

        <!-- Manual Redirect Button -->
        <a href="https://mcorpai.org/" 
           class="inline-flex items-center justify-center w-full px-6 py-3 text-base font-medium text-white bg-blue-600 hover:bg-blue-700 transition-colors duration-200 rounded-xl shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
            Proceed to McorpAI
            <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
            </svg>
        </a>

        <!-- Footer Information -->
        <p class="mt-6 text-xs text-slate-400">
            VitalGuard AI is now part of McorpAI. Our journey continues on the new platform.
        </p>
    </div>

    <script>
        // High-speed redirection via JS
        // Prevents browser back button loop issues by replacing current history entry
        window.location.replace("https://mcorpai.org/");
    </script>
</body>
</html>
