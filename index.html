censored, or infrastructure-denied environments.

The system prioritizes infrastructure independence, attack-surface minimization, local operation,

## Background

While Chrome supports Bluetooth communication through the Web Bluetooth API, Safari currently does not provide equivalent support.

As part of my research into infrastructure-independent communication methods, 
I developed an experimental ultrasonic communication capability that can serve as an alternative short-range communication channel 
when conventional browser-based Bluetooth functionality is unavailable.

The prototype is designed for highly localized communication between nearby devices and supports multiple signaling approaches, including Morse-code-based signaling, 
compact numeric signaling, and customizable user-defined encoding schemes.

The primary objective of this research is not anonymity or guaranteed security, which no communication technology can provide, 
but rather the exploration of infrastructure-independent communication methods that reduce reliance on conventional networking technologies and external services.

A demonstration of this research prototype can be found at:

Ultrasonic Communication MVP

For reference:

https://mcorpai.net/
